<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papyrus Shuffle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        parchment: {
                            light: '#fcf9f2',
                            dark: '#0a0a0a',
                            ink: '#1a1a1a', 
                            silver: '#e0e0e0',
                            accent: '#4a4e69'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }
        .light-mode {
            background-color: #fcf9f2;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            color: #1a1a1a;
        }
        .dark-mode {
            background-color: #050505;
            background-image: url("https://www.transparenttextures.com/patterns/dark-matter.png");
            color: #e0e0e0;
        }
        .paper-font { font-family: 'EB Garamond', serif; }
        .typewriter-font { font-family: 'Special Elite', cursive; }
        
        .deckle-edge {
            clip-path: polygon(
                0% 0%, 100% 0%, 100% 99%, 98% 100%, 96% 99%, 94% 100%, 92% 99%, 90% 100%, 88% 99%, 86% 100%, 84% 99%, 82% 100%, 80% 99%, 78% 100%, 76% 99%, 74% 100%, 72% 99%, 70% 100%, 68% 99%, 66% 100%, 64% 99%, 62% 100%, 60% 99%, 58% 100%, 56% 99%, 54% 100%, 52% 99%, 50% 100%, 48% 99%, 46% 100%, 44% 99%, 42% 100%, 40% 99%, 38% 100%, 36% 99%, 34% 100%, 32% 99%, 30% 100%, 28% 99%, 26% 100%, 24% 99%, 22% 100%, 20% 99%, 18% 100%, 16% 99%, 14% 100%, 12% 99%, 10% 100%, 8% 99%, 6% 100%, 4% 99%, 2% 100%, 0% 99%
            );
        }

        .paper-shadow {
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        
        .dark .paper-shadow {
            box-shadow: 0px 4px 20px rgba(0,0,0,0.8);
            border-color: #333;
        }

        @keyframes shuffle-complex {
            0% { transform: translate(0, 0) rotate(0); z-index: 50; }
            20% { transform: translate(-40px, -10px) rotate(-15deg); z-index: 50; }
            40% { transform: translate(40px, 10px) rotate(15deg); z-index: 10; }
            60% { transform: translate(-20px, 20px) rotate(-5deg); z-index: 30; }
            80% { transform: translate(20px, -20px) rotate(5deg); z-index: 50; }
            100% { transform: translate(0, 0) rotate(0); z-index: 50; }
        }
        .animate-shuffle {
            animation: shuffle-complex 0.4s ease-in-out infinite;
        }
        
        input, textarea {
            background: transparent !important;
        }
        
        /* Mobile Scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="light-mode dark:dark-mode">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
